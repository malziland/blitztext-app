name: BlitztextMac
options:
  bundleIdPrefix: app.blitztext
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ONLY_ACTIVE_ARCH: NO
    MARKETING_VERSION: "1.5"
    CURRENT_PROJECT_VERSION: "15"

packages:
  ArgmaxOSS:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    # Pinned to the immutable commit of tag v0.18.0 for supply-chain integrity:
    # a moved or re-pushed tag cannot silently change what is pulled. Bump deliberately.
    revision: e2adabbe7d98dc4d0ab9a5b75424ecc42a9cdbef

targets:
  BlitztextMac:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Features
      - path: Services
      - path: Views
      - path: Resources
        buildPhase: resources
        excludes:
          - AppIcon.icns
          - Info.plist
          - BlitztextMac.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.blitztext.mac
        PRODUCT_NAME: Blitztext
        INFOPLIST_FILE: Resources/Info.plist
        INFOPLIST_KEY_CFBundleShortVersionString: $(MARKETING_VERSION)
        INFOPLIST_KEY_CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CODE_SIGN_ENTITLEMENTS: Resources/BlitztextMac.entitlements
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: ArgmaxOSS
        product: WhisperKit
    entitlements:
      path: Resources/BlitztextMac.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true
