name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-macos:
    name: Build macOS app
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Secret hygiene scan (working tree + history)
        run: |
          patterns_file=.github/secret-scan-patterns.txt
          if [ ! -f "$patterns_file" ]; then
            echo "Missing $patterns_file"
            exit 1
          fi
          pattern="$(grep -vE '^[[:space:]]*(#|$)' "$patterns_file" | paste -sd'|' -)"
          if [ -z "$pattern" ]; then
            echo "No patterns loaded from $patterns_file"
            exit 1
          fi

          # 1) Working tree
          if grep -RInE \
              --exclude-dir=.git \
              --exclude=secret-scan-patterns.txt \
              "$pattern" .; then
            echo "Potential secret or hardcoded signing identity found in the working tree."
            exit 1
          fi

          # 2) Full Git history: catches values removed in HEAD but still present in
          #    older commits. Requires fetch-depth: 0 on checkout.
          if git log -p --all -- . ':(exclude).github/secret-scan-patterns.txt' \
              | grep -anE "$pattern"; then
            echo "Potential secret or hardcoded signing identity found in Git history."
            exit 1
          fi

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Build
        run: ./build.sh --debug

      - name: Run unit tests (with coverage)
        run: |
          xcodebuild test \
            -project BlitztextMac/BlitztextMac.xcodeproj \
            -scheme BlitztextMac \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            ONLY_ACTIVE_ARCH=YES
